# FlavorSnap Application Configuration
# This file contains configuration for Docker environments

# Application Settings
app:
  name: "FlavorSnap"
  version: "1.0.0"
  environment: "${NODE_ENV:-development}"
  debug: "${DEBUG:-false}"
  
# Docker Configuration
docker:
  # Container Registry
  registry: "${DOCKER_REGISTRY:-}"
  image_tag: "${IMAGE_TAG:-latest}"
  
  # Build Settings
  build:
    no_cache: false
    parallel: true
    pull: true
  
  # Runtime Settings
  runtime:
    restart_policy: "unless-stopped"
    auto_remove: false
    
# Frontend Configuration
frontend:
  # Container Settings
  container:
    name: "flavorsnap-frontend"
    port: 3000
    replicas: "${FRONTEND_REPLICAS:-1}"
    
  # Resources
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
      
  # Health Check
  health_check:
    path: "/"
    interval: "30s"
    timeout: "10s"
    retries: 3
    
  # Environment Variables
  environment:
    NODE_ENV: "${NODE_ENV:-development}"
    NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://backend:5000}"
    NEXT_PUBLIC_MODEL_ENDPOINT: "${NEXT_PUBLIC_MODEL_ENDPOINT:-/predict}"
    MAX_FILE_SIZE: "${MAX_FILE_SIZE:-10485760}"
    ALLOWED_FILE_TYPES: "${ALLOWED_FILE_TYPES:-jpg,jpeg,png,webp}"

# Backend Configuration
backend:
  # Container Settings
  container:
    name: "flavorsnap-backend"
    port: 5000
    replicas: "${BACKEND_REPLICAS:-1}"
    
  # Resources
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
      
  # Health Check
  health_check:
    path: "/health"
    interval: "30s"
    timeout: "10s"
    retries: 3
    
  # Environment Variables
  environment:
    FLASK_ENV: "${FLASK_ENV:-development}"
    PYTHONPATH: "/app"
    MODEL_CONFIDENCE_THRESHOLD: "${MODEL_CONFIDENCE_THRESHOLD:-0.6}"
    UPLOAD_FOLDER: "/app/uploads"
    LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    
  # Model Settings
  model:
    path: "/app/model.pth"
    classes_file: "/app/food_classes.txt"
    batch_size: "${MODEL_BATCH_SIZE:-32}"
    max_image_size: "${MAX_IMAGE_SIZE:-224}"

# Database Configuration
database:
  # PostgreSQL
  postgres:
    host: "${POSTGRES_HOST:-postgres}"
    port: "${POSTGRES_PORT:-5432}"
    database: "${POSTGRES_DB:-flavorsnap}"
    username: "${POSTGRES_USER:-flavorsnap}"
    password: "${POSTGRES_PASSWORD}"
    ssl_mode: "${POSTGRES_SSL_MODE:-prefer}"
    
    # Connection Pool
    pool_size: "${DB_POOL_SIZE:-10}"
    max_overflow: "${DB_MAX_OVERFLOW:-20}"
    pool_timeout: "${DB_POOL_TIMEOUT:-30}"
    
    # Container Resources
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
        
  # Redis
  redis:
    host: "${REDIS_HOST:-redis}"
    port: "${REDIS_PORT:-6379}"
    password: "${REDIS_PASSWORD}"
    database: "${REDIS_DB:-0}"
    
    # Container Resources
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Storage Configuration
storage:
  # Uploads
  uploads:
    path: "/app/uploads"
    max_size: "${MAX_UPLOAD_SIZE:-50MB}"
    cleanup_interval: "${UPLOAD_CLEANUP_INTERVAL:-24h}"
    
  # Model Storage
  models:
    path: "/app/models"
    backup_enabled: true
    backup_interval: "${MODEL_BACKUP_INTERVAL:-7d}"

# Monitoring Configuration
monitoring:
  # Prometheus
  prometheus:
    enabled: "${PROMETHEUS_ENABLED:-true}"
    port: 9090
    retention: "${PROMETHEUS_RETENTION:-200h}"
    scrape_interval: "${SCRAPE_INTERVAL:-15s}"
    
    # Container Resources
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
        
  # Grafana
  grafana:
    enabled: "${GRAFANA_ENABLED:-true}"
    port: 3000
    admin_password: "${GRAFANA_PASSWORD}"
    
    # Container Resources
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# Logging Configuration
logging:
  level: "${LOG_LEVEL:-INFO}"
  format: "json"
  
  # Container Logs
  containers:
    max_size: "100m"
    max_files: 5
    
  # Application Logs
  application:
    path: "/app/logs"
    rotation: "daily"
    retention: "30d"

# Security Configuration
security:
  # Container Security
  containers:
    non_root: true
    read_only_rootfs: false
    drop_capabilities:
      - "ALL"
    add_capabilities:
      - "CHOWN"
      - "SETGID"
      - "SETUID"
      
  # Network Security
  network:
    internal: false
    allow_external: true
    
  # Secrets
  secrets:
    enabled: true
    provider: "environment"

# Performance Configuration
performance:
  # Auto-scaling
  autoscaling:
    enabled: "${AUTOSCALING_ENABLED:-true}"
    min_replicas: "${MIN_REPLICAS:-1}"
    max_replicas: "${MAX_REPLICAS:-10}"
    target_cpu_utilization: "${TARGET_CPU_UTILIZATION:-70}"
    target_memory_utilization: "${TARGET_MEMORY_UTILIZATION:-80}"
    
  # Caching
  caching:
    enabled: "${CACHING_ENABLED:-true}"
    ttl: "${CACHE_TTL:-3600s}"
    max_size: "${CACHE_MAX_SIZE:-100MB}"

# Environment-specific Configurations
environments:
  development:
    debug: true
    log_level: "DEBUG"
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
        
  production:
    debug: false
    log_level: "INFO"
    replicas: 3
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    security:
      containers:
        read_only_rootfs: true
        
  test:
    debug: true
    log_level: "DEBUG"
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
